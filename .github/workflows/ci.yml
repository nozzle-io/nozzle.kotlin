name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        java: [17]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdrm-dev libgbm-dev libegl-dev libgl-dev

      - name: Build native JNI library
        run: make

      - name: Debug native library (Linux)
        if: runner.os == 'Linux'
        run: |
          file .build/libnozzle_jni.so
          ldd .build/libnozzle_jni.so || true

      - name: Compile Kotlin
        run: gradle compileKotlin compileTestKotlin

      - name: Run tests
        run: gradle test --info
        env:
          JAVA_TOOL_OPTIONS: "-Djava.library.path=${{ github.workspace }}/.build"
